{% extends "mock_layout.html" %}

{% block title %}Checkout - Mock Store{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <h2>Shipping Information</h2>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;">Please fill out your delivery details to complete the mock order.</p>

    <div class="card">
        <form action="{{ url_for('mock_checkout') }}" method="POST">
            <div class="form-group">
                <label for="checkout-name">Full Name</label>
                <input type="text" id="checkout-name" name="name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="checkout-address">Street Address</label>
                <input type="text" id="checkout-address" name="address" placeholder="123 Main St" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="checkout-city">City</label>
                    <input type="text" id="checkout-city" name="city" placeholder="New York" required>
                </div>
                <div class="form-group">
                    <label for="checkout-zip">ZIP / Postal Code</label>
                    <input type="text" id="checkout-zip" name="zip_code" placeholder="10001" required>
                </div>
            </div>

            <button type="submit" id="checkout-submit-btn" class="btn" style="margin-top: 1rem;">Proceed to Payment</button>
        </form>
    </div>
</div>
{% endblock %}
